services:
  db:
    image: postgres:15-alpine
    container_name: aries-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aries}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aries}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: aries-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  audio-streamer:
    build: .
    container_name: aries-audio-streamer
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyACM0}
      - NEXTJS_WEBHOOK_URL=${NEXTJS_WEBHOOK_URL:-http://host.docker.internal:3000/api/audio/webhook}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    # On Linux, this maps the serial port. On Windows, additional steps are needed.
    devices:
      - "${SERIAL_PORT:-/dev/ttyACM0}:${SERIAL_PORT:-/dev/ttyACM0}"
    command: python -m app.services.inference_streamer

volumes:
  postgres_data:
